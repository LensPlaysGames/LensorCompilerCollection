name: CI build and test

on: [push, pull_request]

defaults:
  run:
    shell: bash

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: sudo dnf install -y cmake gcc gcc-c++ git libstdc++-devel make ninja
      - name: CMake configure
        run: cmake -G Ninja -B bld
      - name: CMake build
        run: cmake --build bld -j $(nproc)
      - name: Setup Test suite dependencies
        run: sudo dnf install -y emacs libcxx libcxx-devel libcxxabi libcxxabi-devel mingw64-gcc mingw64-libstdc++ ucrt64-gcc ucrt64-libstdc++
      - name: Configure Test suite using CMake
        working-directory: ./tst
        run: cmake -G Ninja -B bld
      - name: Build Test suite
        working-directory: ./tst
        run: cmake --build bld
      - name: Test
        working-directory: ./tst
        run: cmake --build bld -t test
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7
      - name: CMake configure
        run: cmake -G Ninja -B bld -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_CXX_SCAN_FOR_MODULES=OFF -DFMT_MODULE=OFF
      - name: CMake build
        run: cmake --build bld -j $(nproc)
