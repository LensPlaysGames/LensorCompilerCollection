name: CI build and test

on: [push, pull_request]

defaults:
  run:
    shell: bash

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: CMake configure
        run: cmake -G Ninja -B bld
      - name: CMake build
        run: cmake --build bld -j $(nproc)
      - name: Setup Test suite dependencies
        run: sudo apt-get install -y emacs-nox llvm-22 clang-22 libc++-22-dev
      - name: Configure Test suite using CMake
        working-directory: ./tst
        run: cmake -G Ninja -B bld
      - name: Build Test suite
        working-directory: ./tst
        run: cmake --build bld
      - name: Test
        working-directory: ./tst
        run: cmake --build bld -t test
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7
      - name: CMake configure
        run: cmake -G Ninja -B bld -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_CXX_SCAN_FOR_MODULES=OFF -DFMT_MODULE=OFF
      - name: CMake build
        run: cmake --build bld -j $(nproc)
